<!DOCTYPE html>
<html lang="en">



<head>
    <title>Calendyx</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

    <script src="./js/headConstruct.js"></script>

    <link rel="stylesheet" href="./css/forgotPassword.css">

</head>



<body>
    <section class="content" id="content">

        <main>
            <header>
                <h1>Réinitialiser le mot de passe</h1>
            </header>

            <div>
                <form class="forgot-password-card">

                    <header>
                        <p class="auth-title">Calendyx</p>
                        <p class="auth-subtitle">Indiquez l’adresse e-mail associée à votre compte.</p>
                    </header>

                    <p id="message"></p>

                    <div class="frame-input">
                        <label for="email">Adresse e-mail</label>
                        <input id="email" name="email" type="email" required autocomplete="email"
                            placeholder="exemple@domaine.com" aria-describedby="email-help">
                    </div>

                    <div class="email-help">
                        Nous enverrons un lien si l’adresse est enregistrée. (Regardez les spams si tu ne reçois rien.)
                    </div>


                    <div class="footer-form">
                        <button id="submit-forgot-password" class="btn btn-primary">Envoyer la demande</button>
                        <a href="/connection" class="a-nav">Retour à la connexion</a>
                    </div>

                </form>
            </div>
        </main>
    </section>


    <script src="./js/navbar.js"></script>
    <script src="./js/footer.js"></script>
    <script src="./js/deconnectUser.js"></script>
    <script src="./js/forgotPassword.js"></script>
</body>

</html>
