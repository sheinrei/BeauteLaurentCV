<!DOCTYPE html>
<html lang="en">
    
    <head>
        <title>Calendyx</title>       
        <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
        

        <script src="./js/headConstruct.js"></script>
        
        <script src="./js/navbar.js" defer></script>
        <script src="./js/footer.js" defer></script>
        <script src="./js/deconnectUser.js" defer></script>
        
</head>




<body>
    <section class="content" id="content">
        
        <main>
            <header>
                <h1>Bienvenue sur Calendyx</h1>
            </header>
            
            
            
            <section class="form-declanch-rdv">
                <form action="">
                    <p>Déclancher un rdv</p>
                    
                    
                    <label for="">Jour</label>
                    <select name="pets" id="pet-select">
                        <option value="">--Choisir un jour--</option>
                        <option value="lundi">Lundi</option>
                        <option value="mardi">Mardi</option>
                        <option value="mercredi">Mercredi</option>
                        <option value="jeudi">Jeudi</option>
                        <option value="vendredi">Vendredi</option>
                        <option value="samedi">Samedi</option>
                        <option value="dimanche">Dimanche</option>
                    </select>
                    
                    <label for="hourStart">Heure début</label>
                    <input type="text" placeholder="Heure de début">
                    
                    <label for="hourEnd">Durée</label>
                    <input type="text" placeholder="Durée">
                    
                    <p>Client :</p>
                    
                    <label for="">Email du client</label>
                    <input type="text">
                    
                    <label for="">Mobile</label>
                    <input type="text" placeholder="06 XX XX XX XX">
                    
                    <label for="">Nom</label>
                    <input type="text">
                    
                    <label for="">Prenom</label>
                    <input type="text">
                </form>
            </section>
            
        </main>
    </section>

    
</body>

</html>
